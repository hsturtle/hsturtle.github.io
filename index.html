        self.onmessage = function(e) {
            const { imgData, width, height, normalStrength, dispStrength } = e.data;

            const len = data.length;
            const normalData = new Uint8ClampedArray(len);
            const dispData = new Uint8ClampedArray(len);
            const grayData = new Float32Array(width * height);
            
            for (let i = 0; i < len; i += 4) {
                const gray = (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114);
                grayData[i/4] = gray;
                const factor = (259 * (dispStrength + 255)) / (255 * (259 - dispStrength));
                let disp = factor * (gray - 128) + 128;
                dispData[i] = dispData[i+1] = dispData[i+2] = Math.max(0, Math.min(255, disp)); 
                dispData[i+3] = 255;
            }

            const strength = normalStrength; 
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    if (x === 0 || x === width - 1 || y === 0 || y === height - 1) {
                        normalData[idx] = normalData[idx+1] = 128; normalData[idx+2] = normalData[idx+3] = 255; continue;
                    }
                    const tl = grayData[(y-1)*width + (x-1)], tc = grayData[(y-1)*width + x], tr = grayData[(y-1)*width + (x+1)];
                    const cl = grayData[y*width + (x-1)], cr = grayData[y*width + (x+1)];
                    const bl = grayData[(y+1)*width + (x-1)], bc = grayData[(y+1)*width + x], br = grayData[(y+1)*width + (x+1)];
                    const dX = (tr + 2*cr + br) - (tl + 2*cl + bl), dY = (bl + 2*bc + br) - (tl + 2*tc + tr);
                    const nX = -dX * (strength / 10), nY = -dY * (strength / 10), nZ = 255.0; 
                    const length = Math.sqrt(nX*nX + nY*nY + nZ*nZ);

                    normalData[idx] = Math.max(0, Math.min(255, ((nX/length) * 0.5 + 0.5) * 255));
                    normalData[idx+1] = Math.max(0, Math.min(255, ((nY/length) * 0.5 + 0.5) * 255));
                    normalData[idx+2] = Math.max(0, Math.min(255, (nZ/length) * 255)); normalData[idx+3] = 255; 
                }
            }
            self.postMessage({ normalData, dispData }, [normalData.buffer, dispData.buffer]);
        };

                    workCtx.putImageData(new ImageData(new Uint8ClampedArray(dataArray), workCanvas.width, workCanvas.height), 0, 0);
                    workCanvas.toBlob(blob => resolve(URL.createObjectURL(blob)), 'image/png');
                });
                
                Promise.all([createBlobUrl(normalData), createBlobUrl(dispData)]).then(([normalUrl, dispUrl]) => {
                    processedFiles.push({ name: name, originalSrc: origUrl, normalSrc: normalUrl, dispSrc: dispUrl });
                    renderPreview(processedFiles[processedFiles.length - 1]); processNextImage();
                });
            };
            
            worker.postMessage({ imgData: imgData, width: workCanvas.width, height: workCanvas.height, normalStrength: parseFloat(ui.normalInput.value), dispStrength: parseFloat(ui.dispInput.value) });
        }

        function renderPreview(data) {
            const card = document.createElement('div'); 
            card.className = 'bg-white p-2 md:p-3 rounded-lg shadow-sm border border-slate-200 flex flex-col gap-1.5 md:gap-3 h-auto md:h-[320px] shrink-0';
            
            // 🌟 이미지 컨테이너에 hover 효과와 onclick 이벤트(openModal)를 추가했습니다 🌟
            const createImgBlock = (src, label, downloadName) => `
                <div class="flex flex-col gap-0.5 md:gap-1 min-h-[50px] md:h-full">
                    <div class="flex justify-between items-center">
                        <span class="text-[8px] md:text-xs font-semibold text-slate-500 truncate">${label}</span>
                        ${downloadName ? `
                        <a href="${src}" download="${downloadName}" class="text-blue-500 hover:text-blue-700 transition-colors p-0.5 md:p-1 bg-blue-50 hover:bg-blue-100 rounded z-10" title="Download ${label}">
                            <svg class="w-3 h-3 md:w-3.5 md:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </a>` : ''}
                    </div>
                    <div onclick="openModal('${src}', '${label}')" class="group flex-grow rounded overflow-hidden border border-slate-200 checker-bg flex items-center justify-center bg-slate-50 relative min-h-[40px] cursor-zoom-in hover:border-blue-400 hover:ring-1 hover:ring-blue-400 transition-all">
                        <img src="${src}" class="absolute inset-0 w-full h-full object-contain p-0.5 md:p-1" alt="${label}">
                        <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="bg-white/80 p-1 md:p-1.5 rounded shadow-sm">
                                <svg class="w-3 h-3 md:w-5 md:h-5 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                            </div>
                        </div>
                    </div>
                </div>`;
                
            card.innerHTML = `
                <h4 class="font-bold text-[10px] md:text-sm text-slate-800 truncate" title="${data.name}">${data.name}</h4>
                <div class="flex-grow grid grid-cols-3 gap-1.5 md:gap-3 min-h-[60px] md:min-h-0">
                    ${createImgBlock(data.originalSrc, t.file_original, null)}
                    ${createImgBlock(data.normalSrc, t.file_normal, `${data.name}_Normal.png`)}
                    ${createImgBlock(data.dispSrc, t.file_disp, `${data.name}_Displacement.png`)}
                </div>`;
                
            ui.previewGrid.appendChild(card);
        }

        ui.downloadBtn.addEventListener('click', async () => {
            ui.downloadBtn.disabled = true;
            const zip = new JSZip();
            const fetchBlob = async (url) => { const res = await fetch(url); return await res.blob(); };
            
            for (const file of processedFiles) {
                const folder = zip.folder(file.name);
                folder.file(`${file.name}_Normal.png`, await fetchBlob(file.normalSrc));
                folder.file(`${file.name}_Displacement.png`, await fetchBlob(file.dispSrc));
            }
            
            zip.generateAsync({ type: "blob" }).then(function(content) {
                const link = document.createElement('a'); const zipUrl = URL.createObjectURL(content);
                link.href = zipUrl; link.download = `TextureMaps_${new Date().getTime()}.zip`; link.click(); 
                URL.revokeObjectURL(zipUrl); 
                ui.downloadBtn.disabled = false;
            });
        });

        const PRESET_KEY = 'texture_user_preset';
        const defaultPresets = [ { name: t.p_soft, blur: 4, normal: 3, disp: 60 }, { name: t.p_std, blur: 2, normal: 6, disp: 120 }, { name: t.p_strong, blur: 0.5, normal: 15, disp: 200 } ];

        function applyPreset(preset) { ui.blurInput.value = preset.blur; ui.normalInput.value = preset.normal; ui.dispInput.value = preset.disp; updateSliderVals(); if(loadedImagesCache.length > 0) { initWorker(); reprocessAll(); } }

        function loadPresets() {
            ui.presetContainer.innerHTML = '';
            defaultPresets.forEach(preset => {
                const btn = document.createElement('button'); btn.className = 'px-1.5 py-1 md:py-1.5 bg-slate-100 text-slate-600 text-[8px] md:text-[11px] font-semibold rounded hover:bg-slate-200 transition-colors border border-slate-200 whitespace-nowrap shrink-0 shadow-sm'; btn.textContent = preset.name; btn.onclick = () => applyPreset(preset); ui.presetContainer.appendChild(btn);
            });
            const savedUserPreset = JSON.parse(localStorage.getItem(PRESET_KEY));
            if (savedUserPreset) {
                const userBtn = document.createElement('button'); userBtn.className = 'px-1.5 py-1 md:py-1.5 bg-blue-50 text-blue-700 text-[8px] md:text-[11px] font-bold rounded hover:bg-blue-100 transition-colors border border-blue-300 whitespace-nowrap shrink-0 shadow-sm'; userBtn.textContent = `⭐ ${savedUserPreset.name}`; userBtn.title = "우클릭하여 삭제";
                userBtn.onclick = () => applyPreset(savedUserPreset);
                userBtn.oncontextmenu = (e) => { e.preventDefault(); if(confirm(`'${savedUserPreset.name}' 프리셋을 삭제하시겠습니까?`)) { localStorage.removeItem(PRESET_KEY); loadPresets(); } };
                ui.presetContainer.appendChild(userBtn);
            }
        }

        ui.savePresetBtn.addEventListener('click', () => {
            const name = prompt(t.preset_name_prompt, "My Custom"); if (!name) return;
            const presetData = { name: name, blur: ui.blurInput.value, normal: ui.normalInput.value, disp: ui.dispInput.value }; localStorage.setItem(PRESET_KEY, JSON.stringify(presetData)); loadPresets();
        });

        updateSliderVals(); loadPresets();

        // 🌟 모달(Lightbox) 열기/닫기 로직 🌟
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');

        window.openModal = function(src, title) {
            modalImg.src = src;
            modalTitle.textContent = title;
            modal.classList.remove('hidden');
            // 약간의 딜레이를 주어 transition 애니메이션이 자연스럽게 적용되도록 함
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        };

        window.closeModal = function() {
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modalImg.src = '';
            }, 300);
        };

        // 배경(어두운 부분) 클릭 시 닫기
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        // ESC 키 누르면 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
